name: Temporary browser rendering validation

on:
  push:
    branches:
      - agent/static-gtfs-explorer
  pull_request:
    branches:
      - main

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Serve the committed Pages site
        run: |
          python -m http.server 8000 --directory docs >/tmp/http-server.log 2>&1 &
          echo $! > /tmp/http-server.pid
          sleep 2

      - name: Render in headless Chrome
        run: |
          chrome=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          "$chrome" --version
          "$chrome" \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --use-gl=swiftshader \
            --enable-unsafe-swiftshader \
            --window-size=1440,1000 \
            --virtual-time-budget=15000 \
            --dump-dom \
            http://127.0.0.1:8000/ > /tmp/explorer-dom.html
          "$chrome" \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --use-gl=swiftshader \
            --enable-unsafe-swiftshader \
            --window-size=1440,1000 \
            --virtual-time-budget=15000 \
            --screenshot=/tmp/pickmeup-explorer.png \
            http://127.0.0.1:8000/

      - name: Assert the application rendered
        run: |
          grep -q 'class="route-button"' /tmp/explorer-dom.html
          grep -q 'Kelana Jaya' /tmp/explorer-dom.html
          grep -q 'Cached snapshot' /tmp/explorer-dom.html
          grep -q 'maplibregl-canvas' /tmp/explorer-dom.html
          test "$(stat -c%s /tmp/pickmeup-explorer.png)" -gt 50000

      - uses: actions/upload-artifact@v4
        with:
          name: browser-render
          path: |
            /tmp/pickmeup-explorer.png
            /tmp/explorer-dom.html
