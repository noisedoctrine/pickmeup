name: Refresh GTFS snapshot

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PickMeUp
        run: python -m pip install -e .

      - name: Download and export the current feed
        run: |
          python -m pickmeup.gtfs download /tmp/rapid-rail-kl.zip
          python -m pickmeup.gtfs export-static \
            /tmp/rapid-rail-kl.zip \
            docs \
            --metadata /tmp/rapid-rail-kl.metadata.json

      - name: Inspect generated changes
        id: changes
        run: |
          snapshot_id=$(python -c 'import json; print(json.load(open("docs/data/manifest.json"))["active_snapshot"])')
          echo "snapshot_id=$snapshot_id" >> "$GITHUB_OUTPUT"
          git status --short docs/data
          git diff --stat -- docs/data
          if git diff --quiet -- docs/data && [ -z "$(git ls-files --others --exclude-standard docs/data)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open a reviewable snapshot pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SNAPSHOT_ID: ${{ steps.changes.outputs.snapshot_id }}
        run: |
          branch="data/refresh-gtfs-${SNAPSHOT_ID}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add docs/data
          git commit -m "Refresh cached Rapid KL GTFS snapshot"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Refresh cached Rapid KL GTFS snapshot" \
            --body "Generated by the manually triggered **Refresh GTFS snapshot** workflow.\n\nSnapshot: \`${SNAPSHOT_ID}\`\n\nReview the manifest and browser-ready JSON/GeoJSON changes before merging. The original GTFS ZIP is not committed."

      - name: Report unchanged snapshot
        if: steps.changes.outputs.changed == 'false'
        run: echo "The official feed matches the cached snapshot; no pull request was created." >> "$GITHUB_STEP_SUMMARY"
