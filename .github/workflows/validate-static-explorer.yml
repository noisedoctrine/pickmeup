name: Temporary static explorer validation

on:
  push:
    branches:
      - agent/static-gtfs-explorer
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - run: ruff check src tests
      - run: mypy --ignore-missing-imports src/pickmeup
      - run: node --check docs/app.js

      - name: Check pinned CDN assets
        run: |
          curl --fail --head --location https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js
          curl --fail --head --location https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css
          curl --fail --head --location https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js

      - name: Export the current official feed
        run: |
          python -m pickmeup.gtfs download /tmp/rapid-rail-kl.zip
          python -m pickmeup.gtfs export-static \
            /tmp/rapid-rail-kl.zip \
            docs \
            --metadata /tmp/rapid-rail-kl.metadata.json

      - name: Require the cached snapshot to remain unchanged
        run: |
          git diff --exit-code -- docs/data
          test -z "$(git ls-files --others --exclude-standard docs/data)"

      - name: Check deterministic immutable export
        run: |
          snapshot_id=$(python -c 'import json; print(json.load(open("docs/data/manifest.json"))["active_snapshot"])')
          cp -R "docs/data/snapshots/$snapshot_id" /tmp/first-export
          rm -rf "docs/data/snapshots/$snapshot_id"
          python -m pickmeup.gtfs export-static \
            /tmp/rapid-rail-kl.zip \
            docs \
            --metadata /tmp/rapid-rail-kl.metadata.json
          diff -r /tmp/first-export "docs/data/snapshots/$snapshot_id"
          git diff --exit-code -- docs/data

      - name: Validate exported contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("docs/data/manifest.json")
          manifest = json.loads(manifest_path.read_text())
          assert len(manifest["sha256"]) == 64
          assert manifest["active_snapshot"] == manifest["sha256"][:12]
          for relative_path in manifest["files"].values():
              path = manifest_path.parent / relative_path
              assert path.is_file(), path
              json.loads(path.read_text())
          summary = json.loads((manifest_path.parent / manifest["files"]["summary"]).read_text())
          assert summary["route_count"] >= 8
          assert summary["stop_count"] >= 180
          print(json.dumps(manifest, indent=2))
          PY

      - name: Serve the static site
        run: |
          python -m http.server 8000 --directory docs >/tmp/http-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 2
          curl --fail http://127.0.0.1:8000/ >/tmp/index.html
          curl --fail http://127.0.0.1:8000/data/manifest.json >/tmp/manifest.json
          grep -q "PickMeUp rail explorer" /tmp/index.html
          python -m json.tool /tmp/manifest.json >/dev/null
