name: Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Python tests and static checks
        run: |
          python -m pytest -q
          python -m ruff check src tests
          python -m mypy --ignore-missing-imports src/pickmeup

      - name: Check JavaScript syntax
        run: |
          find docs tests -type f -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -n1 node --check

      - name: Run JavaScript unit tests
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            echo "Running ${test_file}"
            node "${test_file}"
          done < <(find tests -type f -name '*.test.js' ! -name 'pages_snapshot.test.js' | sort)

      - name: Validate Pages assets and manifest
        run: node tests/pages_snapshot.test.js assets

      - name: Validate cached station model
        run: node tests/pages_snapshot.test.js model

      - name: Validate cached graph representations
        run: node tests/pages_snapshot.test.js graphs

      - name: Validate cached same-line path
        run: node tests/pages_snapshot.test.js path

      - name: Validate cached GTFS shape clipping
        run: node tests/pages_snapshot.test.js shapes

      - name: Validate cached curated transfers
        run: node tests/pages_snapshot.test.js transfers
