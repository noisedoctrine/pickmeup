name: Temporary live GTFS validation

on:
  push:
    branches:
      - agent/gtfs-data-workbench
  pull_request:
    branches:
      - main

jobs:
  validate-live-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Download current Rapid KL rail feed
        run: |
          set +e
          python -m pickmeup.gtfs download /tmp/rapid-rail-kl.zip > /tmp/live-gtfs-log.txt 2>&1
          status=$?
          echo "exit_status=$status" >> /tmp/live-gtfs-log.txt
          exit $status
      - name: Upload live endpoint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-gtfs-log
          path: /tmp/live-gtfs-log.txt
