name: Temporary live GTFS validation

on:
  push:
    branches:
      - agent/gtfs-data-workbench

jobs:
  validate-live-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Download and inspect current Rapid KL rail feed
        run: |
          python -m pickmeup.gtfs download /tmp/rapid-rail-kl.zip
          python -m pickmeup.gtfs summary /tmp/rapid-rail-kl.zip
          python -m pickmeup.gtfs quality /tmp/rapid-rail-kl.zip
          python -m pickmeup.gtfs curated /tmp/rapid-rail-kl.zip data/curated/interchange_candidate_dispositions.json
          python -m pickmeup.gtfs plot /tmp/rapid-rail-kl.zip /tmp/rapid-rail-kl.png
