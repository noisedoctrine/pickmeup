name: Temporary live GTFS validation

on:
  push:
    branches:
      - agent/gtfs-data-workbench
  pull_request:
    branches:
      - main

jobs:
  validate-live-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - name: Run Ruff
        run: |
          set +e
          ruff check . > /tmp/ruff.txt 2>&1
          status=$?
          cat /tmp/ruff.txt
          exit $status
      - name: Upload Ruff output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: /tmp/ruff.txt
